<!DOCTYPE html>
<html>
<head>
    <title>Skin Analyzer</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #74ebd5, #9face6);
            text-align: center;
            padding: 50px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            margin: auto;
            box-shadow: 0 0 10px gray;
        }

        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        img {
            margin-top: 15px;
            border-radius: 10px;
        }

        .result-box {
            margin-top: 20px;
            padding: 20px;
            background: #e3f2fd;
            border-radius: 10px;
        }

        .suggestion-box {
            margin-top: 10px;
            padding: 10px;
            background: #ffe0c3;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Skin Analyzer 🔍</h1>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="image" onchange="previewImage(event)">
        <br><br>
        <button type="submit">Analyze</button>
    </form>

    <img id="preview" width="200"/>

    {% if result %}
    <div class="result-box">
        <h2>{{ result }}</h2>
        <p class="suggestion-box">{{ suggestion }}</p>
    </div>
    {% endif %}
</div>

<script>
function previewImage(event) {
    var reader = new FileReader();
    reader.onload = function(){
        document.getElementById('preview').src = reader.result;
    }
    reader.readAsDataURL(event.target.files[0]);
}
</script>

</body>
</html>
